<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UW New Product Marketing Fun Team Selector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a0a3e;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: #4b2e83;
      border-bottom: 4px solid #b7a57a;
      padding: 18px 32px;
      text-align: center;
    }

    header h1 {
      font-size: 1.7rem;
      color: #fff;
      letter-spacing: 1px;
    }

    header p {
      color: #b7a57a;
      font-size: 0.9rem;
      margin-top: 4px;
      font-style: italic;
    }

    .uw-logo {
      font-size: 2rem;
      font-weight: 900;
      color: #b7a57a;
      margin-right: 12px;
      vertical-align: middle;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: #2d1a5e;
      border-bottom: 2px solid #4b2e83;
    }

    button {
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
    }

    #assignBtn {
      background: #b7a57a;
      color: #1a0a3e;
    }

    #assignBtn:hover:not(:disabled) {
      background: #d4c09a;
      transform: scale(1.03);
    }

    #resetBtn {
      background: transparent;
      color: #b7a57a;
      border: 2px solid #b7a57a;
    }

    #resetBtn:hover:not(:disabled) {
      background: #b7a57a22;
    }

    .main {
      display: flex;
      gap: 16px;
      padding: 16px;
      align-items: flex-start;
    }

    /* ── Left panel ── */
    .roster-panel {
      flex: 0 0 190px;
      background: #2d1a5e;
      border: 2px solid #4b2e83;
      border-radius: 10px;
      padding: 12px;
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }

    .roster-panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b7a57a;
      margin-bottom: 10px;
      border-bottom: 1px solid #4b2e83;
      padding-bottom: 6px;
    }

    .student-chip {
      font-size: 0.78rem;
      padding: 4px 7px;
      border-radius: 4px;
      margin-bottom: 4px;
      background: #3d2470;
      color: #e8dff8;
      transition: opacity 0.4s, background 0.4s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
    }

    .student-chip.assigned {
      opacity: 0.3;
      background: #2a1855;
    }

    .student-chip.launching {
      background: #b7a57a;
      color: #1a0a3e;
      opacity: 1;
    }

    /* ── Teams grid ── */
    .teams-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .team-card {
      background: #2d1a5e;
      border: 2px solid #4b2e83;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .team-card.receiving {
      border-color: #b7a57a;
      box-shadow: 0 0 16px #b7a57a55;
    }

    .team-header {
      background: #4b2e83;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .team-header span {
      font-weight: 700;
      font-size: 0.9rem;
      color: #b7a57a;
    }

    .team-count {
      font-size: 0.75rem;
      color: #fff9;
    }

    .team-members {
      padding: 8px;
      min-height: 60px;
    }

    .member-tag {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      padding: 5px 8px;
      border-radius: 5px;
      margin-bottom: 5px;
      background: #3d2470;
      color: #e8dff8;
    }

    .member-tag .num {
      color: #b7a57a;
      font-weight: 700;
      font-size: 0.7rem;
      min-width: 14px;
    }

    .empty-hint {
      color: #ffffff33;
      font-size: 0.75rem;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Flying token ── */
    .flying-token {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      background: #b7a57a;
      color: #1a0a3e;
      font-size: 0.78rem;
      font-weight: 700;
      font-family: 'Segoe UI', Arial, sans-serif;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 4px 20px #b7a57a99;
      transition: none;
      will-change: transform, opacity;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #4b2e83; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1><span class="uw-logo">W</span>UW – New Product Marketing Fun Team Selector</h1>
  <p>Foster School of Business &nbsp;|&nbsp; Marketing Cohort</p>
</header>

<div class="controls">
  <button id="assignBtn">🎲 Randomly Assign Teams!</button>
  <button id="resetBtn">↺ Reset</button>
</div>

<div class="main">
  <div class="roster-panel">
    <h2>Students (43)</h2>
    <div id="rosterList"></div>
  </div>
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<script>
  const students = [
    "Alfredo Alamdar","Makylie Rae Bean","Isabelle Berariu","Sanjana Bonagiri",
    "Dylan Brand","Andrew Brunson","Kha-vy Bui","Ari Cherny",
    "Caden Dextur Chiong","Devon Minh Thy Dang","Alexia Drecin","Nikita Dubitski",
    "Jade Ellis","Aaron Abe Gaceta","Noah Daniel Arnold Graetzer","Hailey Granvold",
    "Kaylie Tiffany Heshmati","Jacob Troy Hilse","Tammy Ngoc Huynh","Handan Karakucuk",
    "Kamron Korrell","Matthew Lee","Marlen Makramalla","Gabe Moreno",
    "Fatimah Naji","Francis Stellano Neri","Benny Nguyen","Issabella Tran Nguyen",
    "Will Khoa Nguyen","Yejun Noh","Kairi Maria Rojas","Iman Salhi",
    "David Semaan","Paul Andrew Soper","Laura Summers","Xiaowei Sun",
    "Quentin Swanson","Sing Well To","Mark Trofimchik","Yordanos Abebaw Tsegaye",
    "Josh Winiarski","Maxsun Xaybanha","Uina Yamaguchi"
  ];

  const NUM_TEAMS = 8;
  let chipEls = {};
  let animating = false;

  // Build roster
  const rosterList = document.getElementById('rosterList');
  students.forEach(name => {
    const div = document.createElement('div');
    div.className = 'student-chip';
    div.textContent = name;
    div.id = 'chip-' + name.replace(/\s+/g, '-');
    rosterList.appendChild(div);
    chipEls[name] = div;
  });

  // Build team cards
  const teamsGrid = document.getElementById('teamsGrid');
  for (let i = 1; i <= NUM_TEAMS; i++) {
    const card = document.createElement('div');
    card.className = 'team-card';
    card.innerHTML = `
      <div class="team-header">
        <span>Team ${i}</span>
        <span class="team-count" id="count-${i}">0 members</span>
      </div>
      <div class="team-members" id="team-${i}">
        <div class="empty-hint">— awaiting assignment —</div>
      </div>`;
    teamsGrid.appendChild(card);
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Easing: ease-in-out cubic
  function easeInOut(t) {
    return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
  }

  function flyToken(name, fromEl, toCardEl, onLand) {
    const fromRect = fromEl.getBoundingClientRect();
    const toRect   = toCardEl.getBoundingClientRect();

    const startX = fromRect.left;
    const startY = fromRect.top + fromRect.height / 2;

    // Land near bottom of card
    const endX = toRect.left + 16;
    const endY = toRect.bottom - 20;

    const token = document.createElement('div');
    token.className = 'flying-token';
    token.textContent = name;
    document.body.appendChild(token);

    token.style.left = startX + 'px';
    token.style.top  = startY + 'px';
    token.style.opacity = '1';

    const duration = 520;
    const startTime = performance.now();

    // Arc control point: swoop right then arc left
    const cx = Math.max(startX, endX) + 120;
    const cy = Math.min(startY, endY) - 60;

    function step(now) {
      const elapsed = now - startTime;
      const raw = Math.min(elapsed / duration, 1);
      const t = easeInOut(raw);

      // Quadratic bezier
      const x = (1-t)*(1-t)*startX + 2*(1-t)*t*cx + t*t*endX;
      const y = (1-t)*(1-t)*startY + 2*(1-t)*t*cy + t*t*endY;

      const scale = 1 + 0.25 * Math.sin(Math.PI * t);
      token.style.transform = `translate(${x - startX}px, ${y - startY}px) scale(${scale})`;

      // Fade out in last 20%
      if (raw > 0.8) token.style.opacity = String(1 - (raw - 0.8) / 0.2);

      if (raw < 1) {
        requestAnimationFrame(step);
      } else {
        token.remove();
        onLand();
      }
    }

    requestAnimationFrame(step);
  }

  function assign() {
    if (animating) return;
    animating = true;
    document.getElementById('assignBtn').disabled = true;
    document.getElementById('resetBtn').disabled = true;

    // Reset visuals first
    resetVisuals();

    const shuffled = shuffle(students);
    // 43 / 8 → teams indexed 0-7, person idx%8 → team
    const teams = Array.from({ length: NUM_TEAMS }, () => []);
    shuffled.forEach((name, idx) => teams[idx % NUM_TEAMS].push(name));

    // Flatten into ordered sequence: assign round-robin order so names
    // fly to teams 1,2,3,...8,1,2,... visually
    const sequence = [];
    const maxLen = Math.max(...teams.map(t => t.length));
    for (let round = 0; round < maxLen; round++) {
      for (let t = 0; t < NUM_TEAMS; t++) {
        if (teams[t][round] !== undefined) {
          sequence.push({ name: teams[t][round], team: t + 1 });
        }
      }
    }

    let i = 0;
    const INTERVAL = 130; // ms between each launch

    function launchNext() {
      if (i >= sequence.length) {
        animating = false;
        document.getElementById('assignBtn').disabled = false;
        document.getElementById('resetBtn').disabled = false;
        return;
      }

      const { name, team } = sequence[i];
      i++;

      const chip    = chipEls[name];
      const cardEl  = document.getElementById(`team-${team}`);
      const teamEl  = document.getElementById(`team-${team}`);

      // Highlight chip briefly before launch
      chip.classList.add('launching');

      setTimeout(() => {
        chip.classList.remove('launching');
        chip.classList.add('assigned');

        // Remove empty hint once
        const hint = teamEl.querySelector('.empty-hint');
        if (hint) hint.remove();

        // Highlight receiving card
        cardEl.classList.add('receiving');

        flyToken(name, chip, cardEl, () => {
          // Drop the tag into the team
          const memberIdx = teams[team - 1].indexOf(name) + 1;
          const tag = document.createElement('div');
          tag.className = 'member-tag';
          tag.innerHTML = `<span class="num">${memberIdx}</span>${name}`;
          teamEl.appendChild(tag);

          // Update count
          document.getElementById(`count-${team}`).textContent =
            `${teamEl.querySelectorAll('.member-tag').length} members`;

          cardEl.classList.remove('receiving');
        });

        setTimeout(launchNext, INTERVAL);
      }, 80);
    }

    launchNext();
  }

  function resetVisuals() {
    for (let i = 1; i <= NUM_TEAMS; i++) {
      document.getElementById(`team-${i}`).innerHTML =
        '<div class="empty-hint">— awaiting assignment —</div>';
      document.getElementById(`count-${i}`).textContent = '0 members';
      document.getElementById(`team-${i}`).closest('.team-card').classList.remove('receiving');
    }
    students.forEach(name => {
      chipEls[name].classList.remove('assigned', 'launching');
    });
  }

  document.getElementById('assignBtn').addEventListener('click', assign);
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (animating) return;
    resetVisuals();
  });
</script>
</body>
</html>
