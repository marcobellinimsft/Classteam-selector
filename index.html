<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UW New Product Marketing Fun Team Selector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a0a3e;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: #4b2e83;
      border-bottom: 4px solid #b7a57a;
      padding: 18px 32px;
      text-align: center;
    }
    header h1 { font-size: 1.7rem; color: #fff; letter-spacing: 1px; }
    header p  { color: #b7a57a; font-size: 0.9rem; margin-top: 4px; font-style: italic; }
    .uw-logo  { font-size: 2rem; font-weight: 900; color: #b7a57a; margin-right: 12px; vertical-align: middle; }

    .controls {
      display: flex; justify-content: center; gap: 12px;
      padding: 16px; background: #2d1a5e; border-bottom: 2px solid #4b2e83;
    }

    button {
      padding: 10px 28px; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 6px; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.5px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    #assignBtn { background: #b7a57a; color: #1a0a3e; }
    #assignBtn:hover:not(:disabled) { background: #d4c09a; transform: scale(1.03); }
    #resetBtn  { background: transparent; color: #b7a57a; border: 2px solid #b7a57a; }
    #resetBtn:hover:not(:disabled) { background: #b7a57a22; }

    .main { display: flex; gap: 16px; padding: 16px; align-items: flex-start; }

    /* Left roster */
    .roster-panel {
      flex: 0 0 185px;
      background: #2d1a5e; border: 2px solid #4b2e83; border-radius: 10px;
      padding: 12px; position: sticky; top: 16px;
      max-height: calc(100vh - 140px); overflow-y: auto;
    }
    .roster-panel h2 {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px;
      color: #b7a57a; margin-bottom: 10px;
      border-bottom: 1px solid #4b2e83; padding-bottom: 6px;
    }

    .student-chip {
      font-size: 0.77rem; padding: 5px 8px; border-radius: 4px; margin-bottom: 4px;
      background: #3d2470; color: #e8dff8;
      transition: background 0.3s, opacity 0.3s, color 0.3s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .student-chip.spotlight {
      background: #b7a57a; color: #1a0a3e;
      box-shadow: 0 0 12px #b7a57acc;
    }
    .student-chip.done {
      opacity: 0.28; background: #231550; text-decoration: line-through;
    }

    /* Teams grid */
    .teams-grid {
      flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }

    .team-card {
      background: #2d1a5e; border: 2px solid #4b2e83;
      border-radius: 10px; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s, opacity 0.5s;
    }
    .team-card.receiving {
      border-color: #b7a57a;
      box-shadow: 0 0 20px #b7a57a66;
    }
    .team-card.full {
      border-color: #b7a57a55; opacity: 0.65;
    }

    .team-header {
      background: #4b2e83; padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .team-name { font-weight: 700; font-size: 0.9rem; color: #b7a57a; }
    .team-count { font-size: 0.72rem; color: #fff9; }

    .full-badge {
      font-size: 0.62rem; font-weight: 900; letter-spacing: 1px;
      background: #b7a57a; color: #1a0a3e;
      padding: 2px 7px; border-radius: 10px;
      opacity: 0; transform: scale(0.5);
      transition: opacity 0.5s, transform 0.5s;
    }
    .full-badge.show { opacity: 1; transform: scale(1); }

    .team-members { padding: 8px; min-height: 55px; }
    .empty-hint { color: #ffffff28; font-size: 0.72rem; text-align: center; padding: 14px 0; }

    .member-tag {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.79rem; padding: 5px 8px; border-radius: 5px;
      margin-bottom: 4px; background: #3d2470; color: #e8dff8;
    }
    .member-tag .num { color: #b7a57a; font-weight: 800; font-size: 0.68rem; min-width: 14px; }

    /* Flying pill */
    .pill {
      position: fixed; pointer-events: none; z-index: 9999;
      background: #b7a57a; color: #1a0a3e;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 0.8rem; font-weight: 800;
      padding: 5px 13px; border-radius: 20px;
      white-space: nowrap;
      box-shadow: 0 0 24px #b7a57acc, 0 4px 16px #0008;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #4b2e83; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <h1><span class="uw-logo">W</span>UW – New Product Marketing Fun Team Selector</h1>
  <p>Foster School of Business &nbsp;|&nbsp; Marketing Cohort</p>
</header>

<div class="controls">
  <button id="assignBtn">🎲 Randomly Assign Teams!</button>
  <button id="resetBtn">↺ Reset</button>
</div>

<div class="main">
  <div class="roster-panel">
    <h2>All Students (43)</h2>
    <div id="rosterList"></div>
  </div>
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<script>
const STUDENTS = [
  "Alfredo Alamdar","Makylie Rae Bean","Isabelle Berariu","Sanjana Bonagiri",
  "Dylan Brand","Andrew Brunson","Kha-vy Bui","Ari Cherny",
  "Caden Chiong","Devon Dang","Alexia Drecin","Nikita Dubitski",
  "Jade Ellis","Aaron Gaceta","Noah Graetzer","Hailey Granvold",
  "Kaylie Heshmati","Jacob Hilse","Tammy Huynh","Handan Karakucuk",
  "Kamron Korrell","Matthew Lee","Marlen Makramalla","Gabe Moreno",
  "Fatimah Naji","Francis Neri","Benny Nguyen","Issabella Nguyen",
  "Will Nguyen","Yejun Noh","Kairi Rojas","Iman Salhi",
  "David Semaan","Paul Soper","Laura Summers","Xiaowei Sun",
  "Quentin Swanson","Sing Well To","Mark Trofimchik","Yordanos Tsegaye",
  "Josh Winiarski","Maxsun Xaybanha","Uina Yamaguchi"
];

const NUM_TEAMS = 8;
let chips = {};   // name → DOM element
let busy  = false;

// ── Build roster ──────────────────────────────────────────
const rosterList = document.getElementById('rosterList');
STUDENTS.forEach(name => {
  const el = document.createElement('div');
  el.className = 'student-chip';
  el.textContent = name;
  rosterList.appendChild(el);
  chips[name] = el;
});

// ── Build team cards ──────────────────────────────────────
const teamsGrid = document.getElementById('teamsGrid');
for (let t = 1; t <= NUM_TEAMS; t++) {
  const card = document.createElement('div');
  card.className = 'team-card';
  card.id = `card-${t}`;
  card.innerHTML = `
    <div class="team-header">
      <span class="team-name">Team ${t}</span>
      <span class="team-count" id="cnt-${t}">0 / 5</span>
    </div>
    <div class="team-members" id="members-${t}">
      <div class="empty-hint">— awaiting —</div>
    </div>`;
  teamsGrid.appendChild(card);
}

// ── Helpers ───────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;
}

// ── Fly a pill from chip → target card ───────────────────
function flyPill(name, chipEl, cardEl, onLand) {
  const from = chipEl.getBoundingClientRect();
  const to   = cardEl.getBoundingClientRect();

  const x0 = from.right - 10;                    // leave from right edge of chip
  const y0 = from.top + from.height / 2;
  const x1 = to.left + 20;                       // land at left edge of card
  const y1 = to.top  + to.scrollHeight - 30;

  // Arc: control point is ABOVE the midpoint — clean left-to-right upward curve
  const mx = (x0 + x1) / 2;
  const my = Math.min(y0, y1) - 180;

  const pill = document.createElement('div');
  pill.className = 'pill';
  pill.textContent = name;
  pill.style.left = x0 + 'px';
  pill.style.top  = y0 + 'px';
  document.body.appendChild(pill);

  const DURATION = 1500;
  const t0 = performance.now();

  function frame(now) {
    const raw = Math.min((now - t0) / DURATION, 1);
    const t   = easeInOutCubic(raw);

    // Quadratic bezier: P = (1-t)²·P0 + 2(1-t)t·M + t²·P1
    const bx = (1-t)*(1-t)*x0 + 2*(1-t)*t*mx + t*t*x1;
    const by = (1-t)*(1-t)*y0 + 2*(1-t)*t*my + t*t*y1;

    // Grow in first half, shrink in second half
    const scale = 1 + 0.35 * Math.sin(Math.PI * t);

    pill.style.transform = `translate(${bx - x0}px, ${by - y0}px) scale(${scale})`;
    pill.style.opacity   = raw > 0.78 ? String(1 - (raw - 0.78) / 0.22) : '1';

    if (raw < 1) {
      requestAnimationFrame(frame);
    } else {
      pill.remove();
      onLand();
    }
  }

  requestAnimationFrame(frame);
}

// ── Main assign logic ─────────────────────────────────────
function assign() {
  if (busy) return;
  busy = true;
  document.getElementById('assignBtn').disabled = true;
  document.getElementById('resetBtn').disabled  = true;

  resetVisuals();

  // 43 students, 8 teams → randomly pick 3 teams to have 6, rest get 5
  const caps = new Array(NUM_TEAMS).fill(5);
  shuffle([0,1,2,3,4,5,6,7]).slice(0, 3).forEach(i => caps[i] = 6);

  const teamRosters = Array.from({length: NUM_TEAMS}, () => []);

  // Assign each shuffled student to a PURELY random open team
  const shuffledStudents = shuffle(STUDENTS);
  const sequence = shuffledStudents.map(name => {
    // All teams that still have room
    const open = teamRosters
      .map((r, i) => i)
      .filter(i => teamRosters[i].length < caps[i]);

    // Pick one completely at random (no weighting)
    const chosen = open[Math.floor(Math.random() * open.length)];
    teamRosters[chosen].push(name);
    return { name, teamIdx: chosen };
  });

  // Launch one at a time
  let idx = 0;
  const SPOTLIGHT = 900;   // ms the chip glows gold before launching
  const AFTER_LAND = 500;  // ms pause after landing before next launch

  function next() {
    if (idx >= sequence.length) {
      busy = false;
      document.getElementById('assignBtn').disabled = false;
      document.getElementById('resetBtn').disabled  = false;
      return;
    }

    const { name, teamIdx } = sequence[idx++];
    const teamNum  = teamIdx + 1;
    const chipEl   = chips[name];
    const cardEl   = document.getElementById(`card-${teamNum}`);
    const membersEl = document.getElementById(`members-${teamNum}`);

    // Scroll chip into view, then spotlight it
    chipEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    chipEl.classList.add('spotlight');

    setTimeout(() => {
      chipEl.classList.remove('spotlight');
      chipEl.classList.add('done');

      // Clear placeholder
      const hint = membersEl.querySelector('.empty-hint');
      if (hint) hint.remove();

      cardEl.classList.add('receiving');

      flyPill(name, chipEl, cardEl, () => {
        cardEl.classList.remove('receiving');

        // Add member tag
        const pos = teamRosters[teamIdx].indexOf(name) + 1;
        const tag = document.createElement('div');
        tag.className = 'member-tag';
        tag.innerHTML = `<span class="num">${pos}</span>${name}`;
        membersEl.appendChild(tag);

        // Update count
        const filled = membersEl.querySelectorAll('.member-tag').length;
        const cap    = caps[teamIdx];
        document.getElementById(`cnt-${teamNum}`).textContent = `${filled} / ${cap}`;

        // If team is now full, show badge and dim card
        if (filled === cap) {
          const badge = document.createElement('span');
          badge.className = 'full-badge';
          badge.textContent = '✓ FULL';
          cardEl.querySelector('.team-header').appendChild(badge);
          requestAnimationFrame(() => badge.classList.add('show'));
          cardEl.classList.add('full');
        }

        setTimeout(next, AFTER_LAND);
      });

    }, SPOTLIGHT);
  }

  next();
}

// ── Reset ─────────────────────────────────────────────────
function resetVisuals() {
  for (let t = 1; t <= NUM_TEAMS; t++) {
    document.getElementById(`members-${t}`).innerHTML = '<div class="empty-hint">— awaiting —</div>';
    document.getElementById(`cnt-${t}`).textContent = '0 / 5';
    const card = document.getElementById(`card-${t}`);
    card.classList.remove('receiving', 'full');
    card.querySelectorAll('.full-badge').forEach(b => b.remove());
  }
  STUDENTS.forEach(n => chips[n].classList.remove('spotlight', 'done'));
}

document.getElementById('assignBtn').addEventListener('click', assign);
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!busy) resetVisuals();
});
</script>
</body>
</html>
